<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fuliza Limit Boost Payment</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            :root {
                --primary-color: #00c79c;
                --primary-hover: #02f54b;
                --paypal-color: #0050e4;
                --paypal-hover: #c052b7;
                --stripe-color: #7e78e7;
                --stripe-hover: #4a42e6;
                --text-color: #b61a1a;
                --text-light: #555;
                --divider-color: #080101;
                --background: #f5f7fa;
                --white: #ffffff;
                --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                --border-radius: 12px;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Poppins', sans-serif;
                background: var(--background);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
                color: var(--text-color);
            }
            .container {
                background: var(--white);
                padding: 2.5rem;
                border-radius: var(--border-radius);
                box-shadow: var(--shadow);
                text-align: center;
                max-width: 400px;
                width: 100%;
            }

            h1 {
                margin-bottom: 1rem;
                font-size: 1.5rem;
                font-weight: 600;
            }
            .description {
                color: var(--text-light);
                font-size: 1rem;
                margin-bottom: 1.5rem;
            }
            .price {
                font-size: 2rem;
                font-weight: 600;
                color: var(--primary-color);
                margin-bottom: 2rem;
            }
            .pay-button {
                background: var(--primary-color);
                color: var(--white);
                border: none;
                padding: 1rem 2rem;
                border-radius: var(--border-radius);
                font-size: 1.1rem;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.3s ease;
                width: 100%;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }
            .pay-button:hover {
                background: var(--primary-hover);
            }
            .divider {
                color: var(--divider-color);
                margin: 1.5rem 0;
                position: relative;
            }
            .divider::before {
                content: '';
                position: absolute;
                top: 50%;
                left: 0;
                right: 0;
                height: 1px;
                background: var(--divider-color);
            }
            .divider span {
                background: var(--white);
                padding: 0 1rem;
            }
            .alternative-payments {
                display: flex;
                gap: 1rem;
            }
            .alt-pay-button {
                flex: 1;
                padding: 0.75rem;
                border: none;
                border-radius: var(--border-radius);
                font-size: 0.9rem;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
            }
            .paypal {
                background: var(--paypal-color);
                color: var(--white);
            }
            .paypal:hover {
                background: var(--paypal-hover);
            }
            .stripe {
                background: var(--stripe-color);
                color: var(--white);
            }
            .stripe:hover {
                background: var(--stripe-hover);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Fuliza Limit Boost</h1>
            <p class="description">Complete your payment to boost your Fuliza limit</p>
            <div class="price" id="price">KES 150</div>

            <button id="payButton" class="pay-button">
                <i class="fas fa-mobile-alt"></i> Pay with M-Pesa
            </button>

            <div class="divider">or pay with</div>

            <div class="alternative-payments">
                <button id="paypalButton" class="alt-pay-button paypal">
                    <i class="fab fa-paypal"></i> PayPal
                </button>
                <button id="stripeButton" class="alt-pay-button stripe">
                    <i class="fab fa-cc-stripe"></i> Stripe
                </button>
            </div>
        </div>

        <script src="https://js.paystack.co/v1/inline.js"></script>
        <script>
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const amount = parseInt(urlParams.get('amount')) || 150;
            const phone = urlParams.get('phone') || '';
            const idNumber = urlParams.get('id') || '';

            // Update price display
            document.getElementById('price').textContent = `KES ${amount}`;

            document.addEventListener('DOMContentLoaded', function() {
                const payButton = document.getElementById('payButton');

                payButton.addEventListener('click', payWithPaystack);

                function payWithPaystack() {
                    const ref = 'FULIZA_' + Date.now();

                    const handler = PaystackPop.setup({
                        key: 'pk_live_19caaea5b3f865073305c366d05254d3f50bcf1a', // Use the provided key
                        email: 'customer@fuliza.com',
                        amount: amount * 100, // Amount in kobo
                        currency: 'KES',
                        ref: ref,
                        label: "Fuliza Limit Boost Payment",
                        metadata: {
                            phone: phone,
                            id_number: idNumber
                        },
                        callback: function(response) {
                            alert(`Payment successful! Reference: ${response.reference}`);
                            // Redirect back to main page or success page
                            window.location.href = '/?success=true&ref=' + response.reference;
                        },
                        onClose: function() {
                            alert('Payment was not completed. You can try again.');
                            window.location.href = '/';
                        }
                    });

                    handler.openIframe();
                }

                // Alternative payment methods (placeholders)
                document.getElementById('paypalButton').addEventListener('click', function() {
                    alert('PayPal integration coming soon');
                });

                document.getElementById('stripeButton').addEventListener('click', function() {
                    alert('Stripe integration coming soon');
                });
            });
        </script>
    </body>
</html>
